<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pokemon UI</title>

  <link rel="stylesheet" href="style3.css">

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
</head>
<body>

<div class="container">

  <div class="top-bar">

    <div class="menu-btn">
      <i class="fa-solid fa-bars"></i>
    </div>

    <img src="pokilogo.png" class="logo">

    <div class="theme-btn">
      <i class="fa-regular fa-sun"></i>
    </div>

  </div>

  <div class="search-section">

    <div class="search-box">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" placeholder="Search for a Pokémon...">
    </div>

    <button class="filter-btn">
      Filter by types (1)
    </button>

  </div>

  <div class="card-container">

    <div class="card green">

      <div class="card-top">
        <span>#0908</span>
        <i class="fa-regular fa-heart"></i>
      </div>

      <img src="poki1.png" class="pokemon-img">

      <h2>Meowscarada</h2>

      <div class="type">
        GRASS
      </div>

      <button class="arrow-btn">
        →
      </button>

    </div>

    <div class="card blue">

      <div class="card-top">
        <span>#0624</span>
        <i class="fa-regular fa-heart"></i>
      </div>

      <img src="poki2.jpg" class="pokemon-img">

      <h2>Pawniard</h2>

      <div class="type">
        DARK / STEEL
      </div>

      <button class="arrow-btn">
        →
      </button>

    </div>

    <div class="card orange">

      <div class="card-top">
        <span>#0229</span>
        <i class="fa-regular fa-heart"></i>
      </div>

      <img src="poki2.jpg" class="pokemon-img">

      <h2>Houndoom</h2>

      <div class="type">
        DARK / FIRE
      </div>

      <button class="arrow-btn">
        →
      </button>

    </div>

    <div class="card purple">

      <div class="card-top">
        <span>#0686</span>
        <i class="fa-regular fa-heart"></i>
      </div>

      <img src="poki2.jpg" class="pokemon-img">

      <h2>Inkay</h2>

      <div class="type">
        DARK / PSYCHIC
      </div>

      <button class="arrow-btn">
        →
      </button>

    </div>

  </div>

</div>

</body>
</html>
